let mainAudio = new Audio();
let adAudio = new Audio();
let isPlaying = false, prerollDone = false, currentAdPlaying = false, resumeAfterAd = false;

const playBtn = document.getElementById("playPauseBtn");
const volumeSlider = document.getElementById("volumeCtrl");

function setVolumeBoth() {
    let vol = volumeSlider.value;
    mainAudio.volume = vol;
    adAudio.volume = vol;
}

function updateStreamUrl() {
    mainAudio.pause();
    mainAudio.src = currentStreamUrl;
    mainAudio.load();
    if (isPlaying) mainAudio.play().catch(e => console.error("Stream error", e));
}
updateStreamUrl();

function playMain() {
    if (currentAdPlaying) return;
    mainAudio.play().catch(e => console.error("Play error", e));
    isPlaying = true;
    playBtn.innerHTML = "⏸";
}
function pauseMain() {
    mainAudio.pause();
    isPlaying = false;
    playBtn.innerHTML = "▶";
}
playBtn.addEventListener("click", () => {
    if (isPlaying) pauseMain();
    else if (!prerollDone) attemptPreroll();
    else playMain();
});

function attemptPreroll() {
    const now = new Date();
    let eligible = adRules.filter(r =>
        r.type === "preroll" && r.enabled && r.currentPlays < r.maxPlays &&
        new Date(r.startDateTime) <= now && new Date(r.endDateTime) >= now
    );
    if (eligible.length && !currentAdPlaying) {
        let ad = eligible[0];
        ad.currentPlays++;
        saveAdRules();
        playAdAudio(ad.audioUrl, () => { prerollDone = true; playMain(); renderAdListUI(); });
        return true;
    }
    prerollDone = true;
    playMain();
    return false;
}

function playAdAudio(url, onEnd) {
    if (currentAdPlaying) return;
    currentAdPlaying = true;
    let wasPlaying = isPlaying;
    if (wasPlaying) mainAudio.pause();
    resumeAfterAd = true;
    adAudio.src = url;
    adAudio.play().catch(() => console.warn("Advertentie kon niet starten"));
    adAudio.onended = () => {
        currentAdPlaying = false;
        if (resumeAfterAd && wasPlaying) playMain();
        resumeAfterAd = false;
        if (onEnd) onEnd();
        adAudio.onended = null;
    };
}

function evaluateMidrollsFromSong(songText) {
    if (currentAdPlaying || !isPlaying) return;
    const now = new Date();
    let availableMidrolls = adRules.filter(r =>
        r.type === "midroll" && r.enabled && r.currentPlays < r.maxPlays &&
        new Date(r.startDateTime) <= now && new Date(r.endDateTime) >= now
    );
    if (!availableMidrolls.length) return;

    let triggeredAd = null;
    for (let ad of availableMidrolls) {
        if (ad.triggerType === "metadata" && ad.triggerValue) {
            let keyword = ad.triggerValue.toLowerCase();
            if (songText.toLowerCase().includes(keyword)) {
                let quota = metaKeywordQuotas[keyword] || 0;
                let used = keywordSpotUsage[keyword] || 0;
                if (quota === 0 || used < quota) {
                    triggeredAd = ad;
                    keywordSpotUsage[keyword] = used + 1;
                    break;
                }
            }
        } else if (ad.triggerType === "datetime" && ad.triggerValue) {
            if (new Date(ad.triggerValue) <= now) {
                triggeredAd = ad;
                break;
            }
        }
    }

    if (triggeredAd) {
        triggeredAd.currentPlays++;
        saveAdRules();
        playAdAudio(triggeredAd.audioUrl, renderAdListUI);
    }
}

async function fetchMetadata() {
    let song = null;

    try {
        const res = await fetch(metadataConfig.baseUrl + "?_ts=" + Date.now(), {
            cache: "no-store"
        });

        if (res.ok) {
            const text = await res.text();
            song = text.trim();
        }
    } catch (e) {
        console.warn("Metadata ophalen mislukt", e);
    }

    if (song && song !== currentSong) {
        currentSong = song;
        keywordSpotUsage = {};
        document.getElementById("liveSongTitle").innerHTML = currentSong;
        document.getElementById("nowPlayingMeta").innerHTML = currentSong.substring(0, 60);
        evaluateMidrollsFromSong(currentSong);
    } else if (!song) {
        document.getElementById("liveSongTitle").innerHTML = "Metadata niet beschikbaar";
        document.getElementById("nowPlayingMeta").innerHTML = "live metadata laden...";
    }
}
setInterval(fetchMetadata, 1000);

function updateCurrentProgram() {
    const now = new Date();
    const dateStr = now.toISOString().slice(0, 10);
    const weekdays = ["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"];
    let dayName = weekdays[now.getDay()];
    let base = weeklySchedule.find(d => d.day === dayName);
    if (!base) base = { slots: [] };

    let slots = JSON.parse(JSON.stringify(base.slots));
    const dayOverrides = overrides.filter(ov => ov.date === dateStr);
    dayOverrides.forEach(ov => {
        slots = slots.filter(s => !s.time.split("-")[0].includes(ov.startTime));
        slots.push({ time: ov.startTime + "-" + ov.endTime, title: ov.programTitle, desc: ov.desc || "Vervanging" });
    });

    let currentTime = now.getHours() * 60 + now.getMinutes();
    let activeSlot = slots.find(s => {
        let [start, end] = s.time.split("-");
        let startMin = parseInt(start.split(":")[0]) * 60 + parseInt(start.split(":")[1]);
        let endMin = parseInt(end.split(":")[0]) * 60 + parseInt(end.split(":")[1]);
        return currentTime >= startMin && currentTime < endMin;
    });

    currentProgram = activeSlot ? activeSlot.title : "Geen programma";
    document.getElementById("currentProgramName").innerHTML = currentProgram;
    setTimeout(updateCurrentProgram, 60000);
}

function renderSchedule(dateStr) {
    if (!dateStr) return;
    const weekdays = ["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"];
    let dayName = weekdays[new Date(dateStr).getDay()];
    let base = weeklySchedule.find(d => d.day === dayName);
    if (!base) base = { day: dayName, slots: [{ time: "Hele dag", title: "Geen programma", desc: "" }] };

    let slots = JSON.parse(JSON.stringify(base.slots));
    const dayOverrides = overrides.filter(ov => ov.date === dateStr);
    dayOverrides.forEach(ov => {
        slots = slots.filter(s => !s.time.split("-")[0].includes(ov.startTime) && !s.time.includes(ov.startTime));
        slots.push({ time: ov.startTime + "-" + ov.endTime, title: ov.programTitle, desc: ov.desc || "Vervanging" });
    });

    slots.sort((a, b) => a.time.localeCompare(b.time));

    let html = `<table><thead><tr><th>Tijd</th><th>Programma</th><th>Info</th></tr></thead><tbody>`;
    slots.forEach(s => {
        html += `<tr><td>${s.time}</td><td><strong>${s.title}</strong></td><td>${s.desc || ""}</td></tr>`;
    });
    html += `</tbody></table>`;

    document.getElementById("scheduleTableContainer").innerHTML = html;
    document.getElementById("replacementBadge").innerHTML = dayOverrides.length ? `${dayOverrides.length} vervangingen` : "";
}

function renderWeeklyEditor() {
    let editorDiv = document.getElementById("weeklyScheduleEditor");
    let html = "";
    weeklySchedule.forEach((day, idx) => {
        html += `<div style="border:1px solid #3f4560; border-radius:1rem; margin-bottom:1rem; padding:0.8rem"><h4>${day.day}</h4>`;
        day.slots.forEach((slot, sidx) => {
            html += `<div class="flex-row">
                <input type="text" value="${slot.time}" placeholder="Tijd" data-day="${idx}" data-slot="${sidx}" data-field="time" style="width:120px">
                <input type="text" value="${slot.title}" placeholder="Titel" data-day="${idx}" data-slot="${sidx}" data-field="title">
                <input type="text" value="${slot.desc}" placeholder="Omschrijving" data-day="${idx}" data-slot="${sidx}" data-field="desc">
                <button class="small-btn removeSlotBtn" data-day="${idx}" data-slot="${sidx}">X</button>
            </div>`;
        });
        html += `<button class="small-btn addSlotBtn" data-day="${idx}">Tijdslot toevoegen</button></div>`;
    });
    editorDiv.innerHTML = html;

    document.querySelectorAll("[data-field]").forEach(inp => inp.addEventListener("change", () => {
        let day = parseInt(inp.dataset.day), slot = parseInt(inp.dataset.slot), field = inp.dataset.field;
        weeklySchedule[day].slots[slot][field] = inp.value;
        saveWeeklySchedule();
    }));

    document.querySelectorAll(".removeSlotBtn").forEach(btn => btn.addEventListener("click", () => {
        let day = parseInt(btn.dataset.day), slot = parseInt(btn.dataset.slot);
        weeklySchedule[day].slots.splice(slot, 1);
        saveWeeklySchedule();
        renderWeeklyEditor();
        let currDate = document.getElementById("scheduleDate")?.value;
        if (currDate) renderSchedule(currDate);
    }));

    document.querySelectorAll(".addSlotBtn").forEach(btn => btn.addEventListener("click", () => {
        let day = parseInt(btn.dataset.day);
        weeklySchedule[day].slots.push({ time: "00:00-00:00", title: "Nieuw", desc: "" });
        saveWeeklySchedule();
        renderWeeklyEditor();
    }));
}

function renderOverridesListUI() {
    const listDiv = document.getElementById("overrideListAdmin");
    if (!listDiv) return;
    listDiv.innerHTML = overrides.map((o, idx) =>
        `<div><b>${o.date} ${o.startTime}-${o.endTime}</b> ${o.programTitle} <button data-ovidx="${idx}" class="small-btn">X</button></div>`
    ).join("");
    document.querySelectorAll("[data-ovidx]").forEach(btn => btn.addEventListener("click", () => {
        let i = parseInt(btn.getAttribute("data-ovidx"));
        overrides.splice(i, 1);
        saveOverrides();
        renderOverridesListUI();
        let d = document.getElementById("scheduleDate")?.value;
        if (d) renderSchedule(d);
    }));
}

            ${String(r.audioUrl).substring(0,50)}

        </div>`

    document.querySelectorAll("[data-adidx]").forEach(btn => btn.addEventListener("click", () => {

        renderOverridesListUI();
        let d = document.getElementById("scheduleDate")?.value;
        if (d === date) renderSchedule(d);
    });

    document.getElementById("addNewsAdminBtn")?.addEventListener("click", () => {
        let tit = document.getElementById("newsTitleInput").value;
        let cont = document.getElementById("newsContentInput").value;
        let file = document.getElementById("newsImageUpload").files[0];
        if (!tit || !cont) return;
        let addItem = imageData => {
            newsArticles.push({
                id: "n" + Date.now(),
                title: tit,
                content: cont,
                date: new Date().toISOString().slice(0,10),
                imageData: imageData || ""
            });
            saveNews();
            renderNews();
            renderAdminTools();
        };
        if (file) {
            let reader = new FileReader();
            reader.onload = e => addItem(e.target.result);
            reader.readAsDataURL(file);
        } else addItem("");
    });

    document.getElementById("delNewsBtn")?.addEventListener("click", () => {
        let sel = document.getElementById("newsSelectDelete").value;
        newsArticles = newsArticles.filter(n => n.id !== sel);
        saveNews();
        renderNews();
        renderAdminTools();
    });

    document.getElementById("addAdRuleBtn")?.addEventListener("click", () => {
        let name = document.getElementById("adNameInput").value;
        let type = document.getElementById("adTypeSelect").value;
        let url = document.getElementById("adUrlInput").value;
        let start = document.getElementById("adStart").value;
        let end = document.getElementById("adEnd").value;
        let max = parseInt(document.getElementById("adMaxPlays").value);
        let trigType = document.getElementById("triggerTypeSelect").value;
        let trigVal = document.getElementById("triggerValInput").value;
        if (!name || !url || !start || !end) return;
        adRules.push({
            id: "ad" + Date.now(),
            name, type, audioUrl: url,
            startDateTime: start, endDateTime: end,
            maxPlays: max, currentPlays: 0, enabled: true,
            triggerType: trigType, triggerValue: trigVal
        });
        saveAdRules();
        renderAdListUI();
    });

    document.getElementById("saveQuotasBtn")?.addEventListener("click", () => {
        try {
            let q = JSON.parse(document.getElementById("quotasEditor").value);
            metaKeywordQuotas = q;
            saveMetaQuotas();
            alert("Quota opgeslagen");
        } catch (e) {
            alert("Ongeldige JSON");
        }
    });

    document.getElementById("setManualMetaBtn")?.addEventListener("click", () => {
        let newMeta = document.getElementById("manualMetaInput").value;
        if (newMeta) {
            currentSong = newMeta;
            keywordSpotUsage = {};
            document.getElementById("liveSongTitle").innerHTML = currentSong;
            document.getElementById("nowPlayingMeta").innerHTML = currentSong.substring(0, 60);
            evaluateMidrollsFromSong(currentSong);
        }
    });

    document.getElementById("resetDemoBtn")?.addEventListener("click", () => {
        localStorage.clear();
        location.reload();
    });

    document.getElementById("logoutAdminBtn")?.addEventListener("click", () => {
        adminLogged = false;
        renderAdminTools();
    });
}

function init() {
    loadAllData();

    const datePicker = document.getElementById("scheduleDate");
    if (datePicker) {
        let today = new Date().toISOString().slice(0,10);
        datePicker.value = today;
        datePicker.addEventListener("change", () => renderSchedule(datePicker.value));
        renderSchedule(today);
    }

    renderNews();
    updateCurrentProgram();

    document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => {
        let panel = btn.getAttribute("data-panel");
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active-panel"));
        document.getElementById(panel + "Panel").classList.add("active-panel");
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        if (panel === "programs" && datePicker) renderSchedule(datePicker.value);
        if (panel === "news") renderNews();
        if (panel === "admin") renderAdminTools();
    }));

    document.getElementById("sendContactBtn")?.addEventListener("click", () => {
        let naam = document.getElementById("contactNameInput").value;
        let msg = document.getElementById("contactMsgInput").value;
        document.getElementById("contactFeedback").innerText = (naam && msg) ? `Bedankt ${naam}!` : "Vul alles in";
    });

    document.querySelector(".close-modal")?.addEventListener("click", () => {
        document.getElementById("newsModal").classList.remove("active");
    });

    renderAdminTools();
}
init();
</script>
